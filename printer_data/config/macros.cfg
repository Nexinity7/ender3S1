[respond]
default_type: echo

[gcode_macro START_PRINT]
description: Concurrent heat → mesh → pre-touch wipe (≤150C) → CARTO touch → heat to HOT → post-wipe → purge
gcode:
  {% set BED   = params.BED_TEMP|default(60)|int %}
  {% set HOT   = params.EXTRUDER_TEMP|default(205)|int %}
  {% set TOUCH = 150 if HOT > 150 else HOT %}
  
  SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=print_temp VALUE={HOT}
  RESPOND MSG="[START_PRINT] Stored print temperature: {HOT}°C."

  RESPOND MSG="[START_PRINT] Starting print sequence."
  G90
  M83
  G92 E0

  ; start both heaters
  RESPOND MSG="[START_PRINT] Heating bed to {BED}C and nozzle to {TOUCH}C for safe probing."
  M140 S{BED}                 ; bed heat (no wait)
  M104 S{TOUCH}               ; nozzle toward ≤150C (no wait)
  M106 S255                   ; part fan on to solidify ooze
  RESPOND MSG="[START_PRINT] Homing while heaters warm."
  G28                         ; home while heating
  RESPOND MSG="[START_PRINT] Waiting for bed temperature."
  M190 S{BED}                 ; wait for bed at temp
  RESPOND MSG="[START_PRINT] Waiting for safe touch nozzle temperature."
  M109 S{TOUCH}               ; ensure nozzle is at touch temp (≤150C)

  ; --- WIPE AND LEVEL ---
  RESPOND MSG="[START_PRINT] Resetting Z offset and cleaning nozzle."
  SET_GCODE_OFFSET Z=0        ; Reset Z offset
  G28 Z
  CLEAN_NOZZLE
  RESPOND MSG="[START_PRINT] Building bed mesh."
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE          ; standard Klipper mesh (no adaptive plugin)

  ; --- PRE-TOUCH WIPE @ ~150C ---
  RESPOND MSG="[START_PRINT] Pre-touch nozzle clean."
  CLEAN_NOZZLE
  RESPOND MSG="[START_PRINT] Running Cartographer touch home."
  CARTOGRAPHER_TOUCH_HOME     ; precision touch (requires ≤150C)

  ; --- SAFE PARK WHILE HEATING ---
  RESPOND MSG="[START_PRINT] Parking safely before final heat."
  G90
  G1 Z10 F3000                ; lift safely after touch
  G1 X45 Y232.5 F9000        ; move over back left of bed

  ; --- HEAT TO FINAL TEMP, THEN POST-WIPE ---
  RESPOND MSG="[START_PRINT] Heating nozzle to print temperature: {HOT}C."
  M109 S{HOT}                 ; go to final print temp and wait
  RESPOND MSG="[START_PRINT] Final nozzle clean at print temperature."
  CLEAN_NOZZLE                ; post-heat wipe at print temp

  ; purge and start
  RESPOND MSG="[START_PRINT] Purging nozzle."
  M106 S0
  VORON_PURGE
  G92 E0
  RESPOND MSG="[START_PRINT] Print starting."

[gcode_macro END_PRINT]
description: Move head up, push bed out, and shutdown all steppers and heaters
gcode:
  RESPOND MSG="[END_PRINT] Ending print."
  {% if "xyz" in printer.toolhead.homed_axes %}
    RESPOND MSG="[END_PRINT] Retracting, lifting, and presenting print."
    G91 ;Relative positioning
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G1 E-2 F2700
      G1 E-2 Z0.2 F2400
    {% else %}
      G1 Z0.2 F2400
    {% endif %}
    G1 X5 Y5 F3000
    G1 Z10
    G90

    G1 X45 Y232.5 Z50 F9000 ;Present print
  {% else %}
    RESPOND MSG="[END_PRINT] Skipping park move because printer is not fully homed."
  {% endif %}
  
  RESPOND MSG="[END_PRINT] Turning off fan and heaters."
  M106 S0 ;Turn-off fan
  M104 S0 ;Turn-off hotend
  M140 S0 ;Turn-off bed

  RESPOND MSG="[END_PRINT] Disabling X/Y/E steppers and keeping Z enabled."
  M84 X Y E ;Disable all steppers but Z
  RESPOND MSG="[END_PRINT] Done."
  
[gcode_macro PAUSE]
description: Safe pause: retract, lift, park, cool nozzle, fan 50%
rename_existing: PAUSE_BASE
variable_retract: 2.0
variable_zhop: 10
variable_park_x: 245
variable_park_y: 232.5
variable_cool_temp: 150
variable_print_temp: 0
variable_restore_fan: 0
gcode:
  {% set retract = printer["gcode_macro PAUSE"].retract|float %}
  {% set zhop = printer["gcode_macro PAUSE"].zhop|float %}
  {% set park_x = printer["gcode_macro PAUSE"].park_x|float %}
  {% set park_y = printer["gcode_macro PAUSE"].park_y|float %}
  {% set cool_temp = printer["gcode_macro PAUSE"].cool_temp|int %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set cur_z = printer.toolhead.position.z|float %}
  {% set fan_speed = printer.fan.speed|float %}

  {% if printer.pause_resume.is_paused %}

    RESPOND MSG="[PAUSE] Duplicate pause request ignored."

  {% else %}

    RESPOND MSG="[PAUSE] Print pause requested."

    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=restore_fan VALUE={fan_speed}

    RESPOND MSG="[PAUSE] Saved nozzle target: {printer['gcode_macro PAUSE'].print_temp}°C."
    RESPOND MSG="[PAUSE] Saved part fan: {(fan_speed * 100)|int}%."

    PAUSE_BASE

    RESPOND MSG="[PAUSE] Retracting filament and lifting Z."

    G91
    {% if printer.extruder.can_extrude %}
      G1 E-{retract} F2700
    {% endif %}

    {% if cur_z + zhop < max_z %}
      G1 Z{zhop} F1800
    {% else %}
      G1 Z{max_z - cur_z} F1800
    {% endif %}

    G90

    RESPOND MSG="[PAUSE] Parking toolhead at X{park_x} Y{park_y}."
    G1 X{park_x} Y{park_y} F9000

    RESPOND MSG="[PAUSE] Cooling nozzle to {cool_temp}°C and setting fan to 50%."
    M104 S{cool_temp}
    M106 S128

    RESPOND MSG="[PAUSE] Paused. Resolve the issue, then press RESUME when ready."

  {% endif %}

[gcode_macro RESUME]
description: Two-stage resume with manual wipe
rename_existing: RESUME_BASE
variable_prime: 10.0
variable_ready_to_resume: 0
gcode:
  {% set prime = printer["gcode_macro RESUME"].prime|float %}
  {% set print_temp = printer["gcode_macro PAUSE"].print_temp|int %}
  {% set restore_fan = printer["gcode_macro PAUSE"].restore_fan|float %}
  {% set ready = printer["gcode_macro RESUME"].ready_to_resume|int %}

  {% if ready == 0 %}

    RESPOND MSG="[RESUME] Resume requested."

    {% if print_temp > 0 %}
      RESPOND MSG="[RESUME] Reheating nozzle to {print_temp}°C."
      M109 S{print_temp}
    {% endif %}

    {% if printer.extruder.can_extrude %}
      RESPOND MSG="[RESUME] Purging {prime}mm."
      G91
      G1 E{prime} F300
      G90
    {% endif %}

    RESPOND MSG="[RESUME] Nozzle ready. Wipe the nozzle and press RESUME again."

    M106 S255

    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=ready_to_resume VALUE=1

  {% else %}

    RESPOND MSG="[RESUME] Returning to print."

    M106 S{(restore_fan * 255)|int}

    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=ready_to_resume VALUE=0

    RESUME_BASE

    RESPOND MSG="[RESUME] Print resumed."

  {% endif %}

[gcode_macro CANCEL_PRINT]
description: Stop button behavior edit - run END_PRINT then cancel
rename_existing: CANCEL_PRINT_BASE
gcode:
  RESPOND MSG="[CANCEL_PRINT] Cancel requested. Clearing pause and file state."
  CLEAR_PAUSE
  SDCARD_RESET_FILE
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=ready_to_resume VALUE=0
  END_PRINT
  CANCEL_PRINT_BASE
  RESPOND MSG="[CANCEL_PRINT] Cancel complete."

[gcode_macro CLEAN_NOZZLE]
# Brush rectangle (bottom-left to top-right)
variable_x0: 98.5
variable_y0: 230.5
variable_x1: 133.5
variable_y1: 235.5

# Behavior
variable_wipe_z: 0.25
variable_travel_z: 5.0      # safe travel Z before/after wiping
variable_rows: 7           # how many Y lanes across the brush
variable_cycles: 3          # repeat the whole raster this many times
variable_spd: 135         # mm/s for scrubbing moves
variable_margin: 0.2        # stay inside brush edges

gcode:
  RESPOND MSG="[CLEAN_NOZZLE] Cleaning nozzle."
  {% if "xyz" not in printer.toolhead.homed_axes %}
    RESPOND MSG="[CLEAN_NOZZLE] Printer not fully homed. Homing first."
    G28
  {% endif %}
  G90

  # Allow overrides via params (optional)
  {% set x0 = params.X0|default(x0)|float %}
  {% set y0 = params.Y0|default(y0)|float %}
  {% set x1 = params.X1|default(x1)|float %}
  {% set y1 = params.Y1|default(y1)|float %}
  {% set wipe_z = params.Z|default(wipe_z)|float %}
  {% set travel_z = params.TRAVEL_Z|default(travel_z)|float %}
  {% set rows = params.ROWS|default(rows)|int %}
  {% set cycles = params.CYCLES|default(cycles)|int %}
  {% set mar = params.MARGIN|default(margin)|float %}
  {% set spd = (params.SPD|default(spd)|float) * 60 %}  # mm/min

  {% set start_x = x0 + mar %}
  {% set end_x   = x1 - mar %}
  {% set y_low   = y0 + mar %}
  {% set y_high  = y1 - mar %}
  {% set dy = 0 if rows <= 1 else (y_high - y_low) / (rows - 1) %}
  {% set curz = printer.toolhead.position.z|float %}

  # 1) go to safe travel Z, then to brush at travel Z (no ooze smear on bed)
  {% if curz < travel_z %}
    G1 Z{travel_z} F1500
  {% endif %}
  G1 X{start_x} Y{y_low} F6000

  # 2) drop to wipe height and raster
  G1 Z{wipe_z} F900
  {% for c in range(cycles) %}
    {% for r in range(rows) %}
      {% set y = y_low + (dy * r) %}
      G1 Y{y} F{spd}
      {% if (r % 2) == 0 %}
        G1 X{end_x}   F{spd}
      {% else %}
        G1 X{start_x} F{spd}
      {% endif %}
    {% endfor %}
  {% endfor %}

  # 3) lift back to travel Z
  G1 Z{travel_z} F1500
  RESPOND MSG="[CLEAN_NOZZLE] Done."
